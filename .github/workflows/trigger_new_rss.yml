name: Trigger new rss

on:
  push:
    branches:
      - main

jobs:
  github:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Add')
    steps:
      - name: Trigger new repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: yutkat/new-neovim-plugin-with-category-rss
          event-type: trigger-new-repo
